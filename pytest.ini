[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --cov=src
    --cov=app
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=92
markers =
    unit: Unit tests
    integration: Integration tests
