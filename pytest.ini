[pytest]
minversion = 6.0

# Set base search path for imports
pythonpath = .

# Specify test discovery directories
testpaths =
    tests/unit
    tests/integration
    tests/system

# Default options for better readability
addopts = -v --tb=short

# Register custom markers (avoids PytestUnknownMarkWarning)
markers =
    unit: mark a test as a unit test (isolated, function-level)
    integration: mark a test as an integration test (with DB or multiple modules)
    system: mark a test as a system/end-to-end test (simulating full user flow)
