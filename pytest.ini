[pytest]
# Root directory for test discovery
testpaths =
    tests/unit
    tests/integration
    tests/system

# Show more detailed output
addopts = -v --tb=short --disable-warnings

# Register custom test markers
markers =
    unit: mark a test as a unit test (isolated logic testing)
    integration: mark a test as an integration test (DB or API interaction)
    system: mark a test as a system or end-to-end test (full workflow)

# Ignore certain directories
norecursedirs =
    venv
    .git
    __pycache__

# Set minimum version requirement
minversion = 8.0
