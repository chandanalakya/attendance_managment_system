name: CI/CD Pipeline

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']
  workflow_dispatch:

jobs:
  # =========================
  # Stage 1: Build & Install Dependencies
  # =========================
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.13

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-cov pylint bandit mysql-connector-python streamlit pandas

  # =========================
  # Stage 2: Run Tests
  # =========================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.13

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pandas streamlit mysql-connector-python

      - name: Run pytest
        run: |
          pytest -v test_marking_atte.py

  # =========================
  # Stage 3: Lint Code
  # =========================
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.13

      - name: Install pylint
        run: pip install pylint

      - name: Run pylint
        run: pylint marking_attendance.py test_marking_atte.py --exit-zero --score=y

  # =========================
  # Stage 4: Security Scan
  # =========================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.13

      - name: Install bandit
        run: pip install bandit

      - name: Run Bandit Security Scan
        run: bandit -r . -ll -iii
