name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop", "feature/*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pylint bandit mysql-connector-python streamlit pandas

      - name: Run Unit, Integration & System Tests
        run: |
          pytest -v --cov=src --cov-report=term-missing

      - name: Run Lint (Pylint)
        run: |
          pylint src/ --exit-zero

      - name: Run Security Scan (Bandit)
        run: |
          bandit -r src/ -f json -o security-report.json || true

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

      - name: Upload Security Report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: security-report.json

  deploy:
    needs: build-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Deployment Artifact
        run: |
          zip -r deployment_artifact.zip src/ tests/ htmlcov/ security-report.json
          echo "Deployment artifact created successfully!"

      - name: Upload Deployment Artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment_artifact
          path: deployment_artifact.zip
