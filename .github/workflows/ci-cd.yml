name: CI/CD Pipeline

on:
  push:
    branches: [ main, feature/* ]
  pull_request:
    branches: [ main ]

jobs:
  # Stage 1: Build
  build:
    name: Build Project
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install mysql-connector-python pytest pytest-cov pylint bandit

  # Stage 2: Test
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install mysql-connector-python pytest pytest-cov

      - name: Run Unit, Integration & System Tests
        run: |
          echo "Running Unit Tests..."
          pytest -v tests/unit --disable-warnings --maxfail=1
          echo "Running Integration Tests..."
          pytest -v tests/integration --disable-warnings --maxfail=1
          echo "Running System / E2E Tests..."
          pytest -v tests/system --disable-warnings --maxfail=1

  # Stage 3: Coverage
  coverage:
    name: Generate Coverage Report
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov mysql-connector-python

      - name: Run Coverage
        run: |
          pytest --cov=src --cov-report=xml --disable-warnings

      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # Stage 4: Lint
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    needs: coverage
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Install Linter
        run: |
          python -m pip install --upgrade pip
          pip install pylint

      - name: Run Pylint
        run: |
          pylint src --output-format=parseable > pylint_report.txt || true
          cat pylint_report.txt

      - name: Upload Lint Report
        uses: actions/upload-artifact@v4
        with:
          name: pylint-report
          path: pylint_report.txt

  # Stage 5: Security
  security:
    name: Security Analysis
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Install Bandit
        run: |
          python -m pip install --upgrade pip
          pip install bandit

      - name: Run Bandit Security Scan
        run: |
          bandit -r src -f txt -o bandit_report.txt

      - name: Upload Security Report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit_report.txt
