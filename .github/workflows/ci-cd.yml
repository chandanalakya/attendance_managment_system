name: CI/CD Pipeline - Python

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🛠️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov flake8 bandit black
          pip install streamlit pandas mysql-connector-python

  test:
    runs-on: ubuntu-latest
    needs: build
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: Lakshmireddy@1
          MYSQL_DATABASE: login_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: 🛠️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install Test Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov streamlit pandas mysql-connector-python

      - name: ⏳ Wait for MySQL
        run: |
          for i in {1..10}; do
            if mysqladmin ping -h "127.0.0.1" --silent; then
              echo "✅ MySQL is up!"
              break
            fi
            echo "⏳ Waiting for MySQL..."
            sleep 5
          done

      - name: 🧪 Run Tests
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_USER: root
          MYSQL_PASSWORD: root
          MYSQL_DATABASE: login_db
        run: |
          pytest -v --cov=src --cov-report=term-missing --disable-warnings

  coverage:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: 🛠️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov streamlit pandas mysql-connector-python

      - name: 📊 Generate Coverage Report
        run: |
          pytest --cov=src --cov-report=xml --cov-report=term-missing --disable-warnings

  lint:
    runs-on: ubuntu-latest
    needs: coverage
    steps:
      - name: 🛠️ Checkout Repository
        uses: actions/checkout@v4
      - name: 🔍 Run flake8 Linter
        run: |
          pip install flake8
          flake8 src tests || true

  format:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: 🛠️ Checkout Repository
        uses: actions/checkout@v4
      - name: 🎨 Check Code Format (Black)
        run: |
          pip install black
          black --check src tests || true

  security:
    runs-on: ubuntu-latest
    needs: format
    steps:
      - name: 🛠️ Checkout Repository
        uses: actions/checkout@v4
      - name: 🔒 Run Bandit Security Scan
        run: |
          pip install bandit
          bandit -r src/ -f txt -o security-report.txt || true

  deploy:
    runs-on: ubuntu-latest
    needs: security
    steps:
      - name: 🚀 Simulate Deployment
        run: |
          echo "✅ All stages passed successfully!"
          echo "🚀 Deploying application (simulation)..."
