name: Python 7-Stage CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install All Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          pip install streamlit pandas mysql-connector-python
          pip install bandit flake8 black
          echo "✅ All dependencies installed successfully"

      - name: Verify Installed Packages
        run: |
          echo "Installed packages:"
          pip list

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Test Dependencies
        run: |
          pip install pytest pytest-cov streamlit pandas mysql-connector-python
      - name: Run Tests
        run: pytest --cov=src --cov-report=xml --cov-report=term-missing

  lint:
  runs-on: ubuntu-latest
  steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    - name: Install Dependencies
      run: pip install flake8
    - name: Run flake8
      run: flake8 src tests


    format:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Auto Format with Black
        run: |
          pip install black
          black --line-length 100 src tests


  security:
    runs-on: ubuntu-latest
    needs: format
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Install Bandit
        run: pip install bandit
      - name: Run security scan
        run: bandit -r src -f txt -o security-report.txt

  deploy:
    runs-on: ubuntu-latest
    needs: security
    steps:
      - name: Simulate Deployment
        run: echo "🚀 Deployment stage reached successfully"
