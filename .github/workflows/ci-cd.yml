name: Python 5-Stage CI/CD Pipeline

on:
  push:
    branches: [main, develop, feature/*]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🧾 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install streamlit pytest pytest-cov pylint bandit mysql-connector-python pandas
      - name: ✅ Build success
        run: echo "✅ Build stage completed successfully!"

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 🧾 Checkout code
        uses: actions/checkout@v4
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 🧪 Run tests
        run: pytest -v --cov=src --cov-report=xml --cov-report=term-missing

  lint:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: 🧾 Checkout code
        uses: actions/checkout@v4
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 🔍 Lint code
        run: pylint src || true

  security:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: 🧾 Checkout code
        uses: actions/checkout@v4
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 🔒 Run Bandit Security Scan
        run: bandit -r src || true

  deploy:
    runs-on: ubuntu-latest
    needs: security
    steps:
      - name: 🧾 Checkout code
        uses: actions/checkout@v4
      - name: 🚀 Simulate Deploy
        run: echo "🎉 Deployment successful! All stages passed!"
