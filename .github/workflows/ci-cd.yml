  # =========================
  # Stage 2: Unit & Integration Tests
  # =========================
  test:
    name: Run Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov sqlalchemy sqlparse mysql-connector-python streamlit pandas

      - name: Run Unit & Integration Tests (skip system)
        run: |
          echo "Running Unit + Integration Tests..."
          # Run all tests under /tests
          pytest tests --disable-warnings

  # =========================
  # Stage 3: Coverage
  # =========================
  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov sqlalchemy sqlparse

      - name: Run coverage
        run: |
          echo "Running Coverage..."
          pytest --cov=src --cov-report=xml --disable-warnings || pytest --cov=src --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # =========================
  # Stage 4: Lint
  # =========================
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    needs: coverage

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install pylint
        run: pip install pylint sqlalchemy sqlparse

      - name: Run pylint
        run: |
          echo "Running Lint..."
          pylint src --exit-zero --score=y

  # =========================
  # Stage 5: Security Scan
  # =========================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit sqlalchemy sqlparse

      - name: Run Bandit Security Scan
        run: |
          echo "Running Security Scan..."
          bandit -r src -ll -iii
