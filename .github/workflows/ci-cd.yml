name: 🧩 CI/CD Pipeline (Python Project)

on:
  push:
    branches: [ "main", "develop", "feature/*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test:
    name: Build, Test, and Deploy
    runs-on: ubuntu-latest

    steps:
      # -------------------- 1️⃣ BUILD STAGE --------------------
      - name: 🧱 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pylint bandit

      # -------------------- 2️⃣ LINT STAGE --------------------
      - name: 🧹 Run Code Linting (Pylint)
        run: |
          echo "🔍 Checking code style with pylint..."
          pylint src || true   # don't fail build on lint warnings

      # -------------------- 3️⃣ TEST STAGE --------------------
      - name: 🧪 Run Unit, Integration & System Tests
        run: |
          echo "🧪 Running test suite with coverage..."
          pytest -v --cov=src --cov-report=term-missing

      # -------------------- 4️⃣ SECURITY STAGE --------------------
      - name: 🔒 Run Security Audit (Bandit)
        run: |
          echo "🔒 Running Bandit security scan..."
          bandit -r src -f txt -o security-report.txt || true
          echo "✅ Security report generated: security-report.txt"

      # -------------------- 5️⃣ DEPLOY STAGE --------------------
      - name: 🚀 Simulate Deployment
        if: success()
        run: |
          echo "🚀 All tests passed successfully!"
          echo "Deploying to staging environment..."
          echo "✅ Deployment simulation complete."

      # -------------------- REPORT ARTIFACTS (OPTIONAL) --------------------
      - name: 📤 Upload Security Report
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: security-report.txt
