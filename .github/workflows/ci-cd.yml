name: Student Attendance System CI/CD

on:
  push:
    branches:
      - main
      - feature/student_login
  pull_request:
    branches:
      - main

jobs:
  ci-cd:
    runs-on: ubuntu-latest

    env:
      MYSQL_HOST: localhost
      MYSQL_DATABASE: sams-db
      MYSQL_USER: root
      MYSQL_PASSWORD: Aazz123@@

    steps:
      # 1️⃣ Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v3

      # 2️⃣ Build - Install dependencies
      - name: Build - Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov mysql-connector-python pylint bandit

      # 3️⃣ Test - Unit & Integration & System
      - name: Test - Run all tests
        run: |
          echo "Running Unit Tests..."
          pytest tests/unit --disable-warnings --maxfail=1
          echo "Running Integration Tests..."
          pytest tests/integration --disable-warnings --maxfail=1
          echo "Running System / E2E Tests..."
          pytest tests/system --disable-warnings --maxfail=1

      # 4️⃣ Coverage - Generate coverage reports
      - name: Coverage - Generate Reports
        run: |
          pytest -v --cov=src --cov-report=xml --cov-report=term-missing --disable-warnings
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report
          path: coverage.xml

      # 5️⃣ Lint - Pylint score
      - name: Lint - Pylint with Score
        run: |
          pylint src/**/*.py --exit-zero
      # 6️⃣ Security - Bandit scan
      - name: Security - Bandit Scan
        run: |
          bandit -r src/ -ll
