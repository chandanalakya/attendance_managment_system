name: CI/CD Pipeline

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']
  workflow_dispatch:

jobs:
  # =========================
  # Stage 1: Build
  # =========================
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'requirements*.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt || pip install -r requirements.txt
          pip install pytest pytest-cov pylint bandit sqlalchemy sqlparse mysql-connector-python streamlit pandas bcrypt python-dotenv

  # =========================
  # Stage 2: Unit & Integration Tests
  # =========================
  test:
    name: Run Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'requirements*.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt || pip install -r requirements.txt
          pip install pytest pytest-cov sqlalchemy sqlparse mysql-connector-python streamlit pandas bcrypt python-dotenv

      - name: Run Unit & Integration Tests
        run: |
          echo "Running Unit + Integration Tests..."
          export PYTHONPATH=$PYTHONPATH:$(pwd)   # <-- critical for src package
          pytest

  # =========================
  # Stage 3: Coverage
  # =========================
  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'requirements*.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt || pip install -r requirements.txt
          pip install pytest pytest-cov sqlalchemy sqlparse

      - name: Run coverage
        run: |
          echo "Running Coverage..."
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          pytest --cov=src --cov-report=xml --cov-fail-under=80 --disable-warnings

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # =========================
  # Stage 4: Lint
  # =========================
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'requirements*.txt'

      - name: Install pylint
        run: pip install pylint sqlalchemy sqlparse

      - name: Run pylint
        run: |
          echo "Running Lint..."
          pylint src --exit-zero --score=y

  # =========================
  # Stage 5: Security Scan
  # =========================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'requirements*.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit sqlalchemy sqlparse

      - name: Run Bandit Security Scan
        run: |
          echo "Running Security Scan..."
          bandit -r src -ll -iii

