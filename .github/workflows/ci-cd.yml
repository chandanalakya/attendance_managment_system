name: CI/CD Pipeline - Python

on:
  push:
    branches:
      - main
      - develop
      - feature/*
  pull_request:
    branches:
      - main

jobs:
  # --------------------------------------------------
  # 1️⃣ BUILD STAGE
  # --------------------------------------------------
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest

    steps:
      - name: 🛠️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install pytest pytest-cov flake8 bandit black streamlit mysql-connector-python bcrypt pandas python-dotenv

  # --------------------------------------------------
  # 2️⃣ TEST STAGE (with MySQL Service)
  # --------------------------------------------------
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    needs: build
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: login_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: 🛠️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install Test Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov streamlit mysql-connector-python bcrypt pandas python-dotenv

      - name: ⏳ Wait for MySQL
        run: |
          for i in {1..10}; do
            if mysqladmin ping -h "127.0.0.1" --silent; then
              echo "✅ MySQL is up!"
              break
            fi
            echo "⏳ Waiting for MySQL..."
            sleep 5
          done

      - name: 🧪 Run All Tests
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_USER: root
          MYSQL_PASSWORD: root
          MYSQL_DATABASE: login_db
        run: |
          pytest tests/ --maxfail=1 --disable-warnings -v --cov=src --cov-report=term-missing

  # --------------------------------------------------
  # 3️⃣ COVERAGE STAGE
  # --------------------------------------------------
  coverage:
    name: 📊 Coverage
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install Dependencies
        run: |
          pip install pytest pytest-cov streamlit mysql-connector-python bcrypt pandas python-dotenv

      - name: 📊 Generate Coverage Report
        run: |
          pytest --cov=src --cov-report=xml --cov-report=term-missing --disable-warnings

      - name: 📤 Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # --------------------------------------------------
  # 4️⃣ LINT STAGE
  # --------------------------------------------------
  lint:
    name: ✨ Lint
    runs-on: ubuntu-latest
    needs: coverage

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 🔍 Run flake8 Linter
        run: |
          pip install flake8
          flake8 src tests || true

  # --------------------------------------------------
  # 5️⃣ FORMAT STAGE
  # --------------------------------------------------
  format:
    name: 🎨 Format Check
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 🎨 Check Code Format (Black)
        run: |
          pip install black
          black --check src tests || true

  # --------------------------------------------------
  # 6️⃣ SECURITY STAGE
  # --------------------------------------------------
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: format

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 🔒 Run Bandit Security Scan
        run: |
          pip install bandit
          bandit -r src/ -f txt -o security-report.txt || true

  # --------------------------------------------------
  # 7️⃣ DEPLOY STAGE (Simulation)
  # --------------------------------------------------
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: security

    steps:
      - name: 🚀 Simulate Deployment
        run: |
          echo "✅ All stages passed successfully!"
          echo "🚀 Deploying application (simulation)..."
