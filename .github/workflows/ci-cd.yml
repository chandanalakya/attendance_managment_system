name: Python CI/CD

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      # 🧾 Step 1: Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 💾 Step 2: Clean up disk space to prevent "no space left" errors
      - name: Clean up disk space
        run: |
          echo "Before cleanup:"
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo docker system prune -af || true
          echo "After cleanup:"
          df -h

      # 🐍 Step 3: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"   # ✅ stable version compatible with all your libs

      # 📦 Step 4: Cache pip packages
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # 📥 Step 5: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 🔍 Step 6: Lint your code with flake8
      - name: Lint (flake8)
        run: |
          echo "🔍 Running flake8..."
          flake8 . || echo "⚠️ Lint warnings (non-blocking)"

      # 🎨 Step 7: Check code formatting with black
      - name: Format check (black)
        run: |
          echo "🎨 Checking formatting..."
          black --check . || echo "⚠️ Formatting warnings (non-blocking)"

      # 🧪 Step 8: Run tests
      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}/src   # ✅ Fix for "ModuleNotFoundError: src"
          SAMS2_DB_PATH: ./test.db
        run: |
          echo "🧪 Running tests..."
          pytest -q --disable-warnings
