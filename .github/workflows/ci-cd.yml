name: Python 7-Stage CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install pytest pytest-cov streamlit pandas mysql-connector-python
      - name: Verify installation
        run: |
          python -m pip list
      - name: Build successful
        run: echo "✅ Build stage completed."

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install pytest pytest-cov streamlit pandas mysql-connector-python
      - name: Run tests
        run: pytest -v

  coverage:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install pytest pytest-cov
      - name: Run coverage report
        run: pytest --cov=src --cov-report=xml --cov-report=term-missing

  lint:
    runs-on: ubuntu-latest
    needs: coverage
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install flake8
        run: pip install flake8
      - name: Run lint check
        run: flake8 src tests

  format:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install black
        run: pip install black
      - name: Check code formatting
        run: black --check src tests

  security:
    runs-on: ubuntu-latest
    needs: format
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Bandit
        run: pip install bandit
      - name: Run security scan
        run: bandit -r src/ -f txt -o security-report.txt

  deploy:
    runs-on: ubuntu-latest
    needs: security
    steps:
      - name: Deployment simulation
        run: echo "🚀 Deployment successful!"
