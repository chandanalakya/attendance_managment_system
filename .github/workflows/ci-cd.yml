name: CI/CD Pipeline

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']
  workflow_dispatch:

jobs:
  # =========================
  # Stage 1: Build
  # =========================
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'requirements*.txt'

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$(pwd)" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt || pip install -r requirements.txt
          pip install pytest pytest-cov pylint bandit sqlalchemy sqlparse mysql-connector-python streamlit pandas bcrypt python-dotenv

  # =========================
  # Stage 2: Unit & Integration Tests
  # =========================
  test:
    name: Run Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: build
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: sams_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_USER: root
      DB_PASS: rootpass
      DB_NAME: sams_db
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$(pwd)" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt || pip install -r requirements.txt
          pip install pytest pytest-cov mysql-connector-python

      - name: Wait for MySQL to be ready
        run: |
          for i in {1..30}; do
            mysqladmin ping -h 127.0.0.1 -P 3306 -uroot -prootpass && break
            echo "Waiting for MySQL..."
            sleep 2
          done

      - name: Initialize MySQL Schema
        run: |
          mysql -h 127.0.0.1 -P 3306 -u root -prootpass sams_db < ./src/utils/schema_mysql.sql

      - name: Run Unit & Integration Tests
        run: |
          echo "Running Unit + Integration Tests..."
          pytest --pyargs tests --disable-warnings

  # =========================
  # Stage 3: Coverage
  # =========================
  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$(pwd)" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov sqlalchemy sqlparse

      - name: Run coverage
        run: |
          echo "Running Coverage..."
          pytest --cov=src --cov-report=xml --cov-fail-under=80 --disable-warnings --pyargs tests

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # =========================
  # Stage 4: Lint
  # =========================
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$(pwd)" >> $GITHUB_ENV

      - name: Install pylint
        run: pip install pylint sqlalchemy sqlparse

      - name: Run pylint
        run: |
          echo "Running Lint..."
          pylint src --exit-zero --score=y

  # =========================
  # Stage 5: Security Scan
  # =========================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$(pwd)" >> $GITHUB_ENV

      - name: Install dependencies
        run: pip install bandit sqlalchemy sqlparse

      - name: Run Bandit Security Scan
        run: |
          echo "Running Security Scan..."
          bandit -r src -ll -iii
