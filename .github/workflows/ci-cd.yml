name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - feature/*
  pull_request:
    branches:
      - main

jobs:
  # ---------------------------------------
  # 1️⃣ BUILD STAGE
  # ---------------------------------------
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8 bandit black

  # ---------------------------------------
  # 2️⃣ TEST STAGE (Runs All Tests)
  # ---------------------------------------
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run All Tests (Including System)
        run: |
          pytest tests/ --maxfail=1 --disable-warnings -v

  # ---------------------------------------
  # 3️⃣ COVERAGE STAGE
  # ---------------------------------------
  coverage:
    name: 📊 Coverage
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov

      - name: Run Coverage
        run: |
          pytest --cov=src --cov-report=xml --cov-report=term
          echo "Coverage report generated ✅"

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ---------------------------------------
  # 4️⃣ LINT STAGE
  # ---------------------------------------
  lint:
    name: ✨ Lint
    runs-on: ubuntu-latest
    needs: coverage

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: |
          pip install flake8

      - name: Run flake8
        run: |
          flake8 src/ tests/

  # ---------------------------------------
  # 5️⃣ SECURITY STAGE
  # ---------------------------------------
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: |
          pip install bandit

      - name: Run Bandit Security Scan
        run: |
          bandit -r src/ -ll
