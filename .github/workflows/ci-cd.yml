name: CI/CD Pipeline

on:
  push:
    branches: [main, feature/*]
  pull_request:
    branches: [main]

jobs:
  # =========================
  # Stage 1: Build
  # =========================
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pylint bandit mysql-connector-python

  # =========================
  # Stage 2: Unit & Integration Tests
  # =========================
  test:
    name: Run Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov mysql-connector-python

      - name: Run Unit & Integration Tests (skip system)
        run: |
          echo "Running Unit + Integration Tests..."
          pytest tests/unit tests/integration --disable-warnings

  # =========================
  # Stage 3: Coverage
  # =========================
  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run coverage
        run: |
          echo "Running Coverage..."
          pytest --cov=src --cov-report=xml --disable-warnings --deselect=tests/system

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # =========================
  # Stage 4: Lint
  # =========================
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    needs: coverage
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12

      - name: Install pylint
        run: pip install pylint

      - name: Run pylint
        run: |
          echo "Running Lint..."
          pylint src --exit-zero --score=y

  # =========================
  # Stage 5: Security Scan
  # =========================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12

      - name: Install bandit
        run: pip install bandit

      - name: Run Bandit Security Scan
        run: |
          echo "Running Security Scan..."
          bandit -r src -ll -iii
