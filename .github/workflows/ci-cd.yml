name: CI/CD Pipeline - Python

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8 bandit black streamlit pandas mysql-connector-python

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Run Unit & Integration Tests
        run: pytest -v --cov=src --cov-report=term-missing

  coverage:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Run Coverage
        run: pytest --cov=src --cov-report=xml

  lint:
    runs-on: ubuntu-latest
    needs: coverage
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Run flake8 Lint
        run: flake8 src tests

  format:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Check Code Formatting
        run: black --check src tests

  security:
    runs-on: ubuntu-latest
    needs: format
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Run Bandit Security Scan
        run: bandit -r src/ -f txt -o security-report.txt

  deploy:
    runs-on: ubuntu-latest
    needs: security
    steps:
      - name: Simulate Deployment
        run: echo "🚀 Deployment successful!"
