name: Python CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop", "feature/*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      # Step 1️⃣: Checkout your repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2️⃣: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Step 3️⃣: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "⚠️ No requirements.txt found, installing manually..."
            pip install pytest pytest-cov pylint bandit mysql-connector-python streamlit pandas
          fi

      # Step 4️⃣: Run tests with coverage
      - name: Run Pytest (with coverage)
        run: pytest -v --cov=src --cov-report=term-missing

      # Step 5️⃣: Run linting (code quality)
      - name: Run Lint (Pylint)
        run: pylint src/ --exit-zero

      # Step 6️⃣: Security analysis
      - name: Run Security Scan (Bandit)
        run: bandit -r src/ -f json -o security-report.json || true

      # Step 7️⃣: Upload reports (coverage + security)
      - name: Upload Reports
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            htmlcov/
            security-report.json

  deploy:
    needs: build-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Deployment Artifact
        run: |
          zip -r deployment_artifact.zip src/ tests/ htmlcov/ security-report.json
          echo "✅ Deployment artifact created successfully!"

      - name: Upload Deployment Artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment_artifact
          path: deployment_artifact.zip
