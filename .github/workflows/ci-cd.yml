name: CI/CD Pipeline

on:
  push:
    branches: [ main, feature/* ]
  pull_request:
    branches: [ main ]

jobs:
  setup:
    name: Setup Environment
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: Aazz123@@
          MYSQL_DATABASE: sams_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pylint bandit pytest pytest-cov mysql-connector-python

      - name: Wait for MySQL
        run: |
          until mysqladmin ping -h "127.0.0.1" --silent; do
            echo "Waiting for MySQL..."
            sleep 5
          done

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v3
      - name: Install Dependencies
        run: pip install -r requirements.txt
      - name: Verify Build
        run: echo "Build successful"

  test:
    name: Run Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: build
    env:
      DB_HOST: 127.0.0.1
      DB_USER: root
      DB_PASS: Aazz123@@
      DB_NAME: sams_db
    steps:
      - uses: actions/checkout@v3
      - name: Install Dependencies
        run: pip install -r requirements.txt
      - name: Run Unit Tests
        run: |
          echo "Running Unit Tests..."
          pytest tests/unit --disable-warnings --maxfail=1
      - name: Run Integration Tests
        run: |
          echo "Running Integration Tests..."
          pytest tests/integration --disable-warnings --maxfail=1

  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v3
      - name: Install Dependencies
        run: pip install -r requirements.txt
      - name: Generate Coverage
        run: |
          pytest --cov=src --cov-report=xml --disable-warnings

  lint:
    name: Lint & Style Check
    runs-on: ubuntu-latest
    needs: coverage
    steps:
      - uses: actions/checkout@v3
      - name: Install Linting Tools
        run: pip install pylint bandit
      - name: Run Pylint
        run: |
          pylint src --exit-zero --score=y
      - name: Run Bandit (Security Lint)
        run: |
          bandit -r src -ll

  security:
    name: Security Checks
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v3
      - name: Install Security Tools
        run: pip install bandit
      - name: Run Bandit Scan
        run: bandit -r src -ll
