name: Python CI/CD

on:
  push:
    branches:
      - '**'              # Trigger on all branches
  pull_request:
    branches:
      - '**'              # Trigger on all PRs
  workflow_dispatch:       # Allow manual runs from the Actions tab

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      # Checkout the code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Cache pip dependencies to speed up builds
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 black pytest

      # Run linting with flake8 (non-blocking)
      - name: Lint code (flake8)
        run: |
          echo "🔍 Running flake8 lint check..."
          flake8 . || echo "⚠️ Linting found issues, but continuing..."

      # Run formatting check with black (non-blocking)
      - name: Check code formatting (black)
        run: |
          echo "🎨 Checking formatting..."
          black --check . || echo "⚠️ Formatting issues found, but continuing..."

      # Run tests
      - name: Run tests (pytest)
        env:
          SAMS2_DB_PATH: ./test.db
        run: |
          echo "🧪 Running tests..."
          pytest -q --disable-warnings

      # Upload test results as an artifact (optional)
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: .pytest_cache

  # (Optional) Code quality summary job
  report:
    needs: build-test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Summary
        run: |
          echo "✅ CI/CD pipeline completed."
          echo "If tests failed, check the 'build-test' job logs above."
