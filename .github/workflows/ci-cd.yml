name: Python CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop", "feature/*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      # 🧩 Step 1: Checkout repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 🐍 Step 2: Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 📦 Step 3: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install project requirements if file exists
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Install dev tools
          pip install pytest pytest-cov pylint bandit mysql-connector-python streamlit pandas

      # 🧪 Step 4: Run all test cases with coverage
      - name: Run Tests with Coverage
        run: |
          pytest -v --cov=src --cov-report=term-missing

      # 🧹 Step 5: Lint code (check code quality)
      - name: Run Lint (Pylint)
        run: |
          pylint src/ --exit-zero

      # 🔒 Step 6: Run security scan using Bandit
      - name: Run Security Scan (Bandit)
        run: |
          bandit -r src/ -f json -o security-report.json || true

      # 📊 Step 7: Upload reports as build artifacts
      - name: Upload Reports
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            htmlcov/
            security-report.json

  deploy:
    needs: build-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      # 🧩 Step 1: Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 📦 Step 2: Package app + reports for deployment
      - name: Create Deployment Artifact
        run: |
          zip -r deployment_artifact.zip src/ tests/ htmlcov/ security-report.json
          echo "Deployment artifact created successfully!"

      # 🚀 Step 3: Upload deployment artifact
      - name: Upload Deployment Artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment_artifact
          path: deployment_artifact.zip
