name: 🧩 CI/CD Pipeline (Python Attendance Project)

on:
  push:
    branches: [ "main", "develop", "feature/*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  ci-cd-pipeline:
    runs-on: ubuntu-latest
    name: Complete 5-Stage CI/CD Pipeline

    steps:
      # ====================================================================
      # 1️⃣ BUILD STAGE – Checkout repository & install dependencies
      # ====================================================================
      - name: 🧱 Build Stage - Checkout code and set up Python
        uses: actions/checkout@v4

      - name: ⚙️ Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pylint bandit

      # ====================================================================
      # 2️⃣ LINT STAGE – Code quality and style check
      # ====================================================================
      - name: 🧹 Lint Stage - Code Quality Check (Pylint)
        run: |
          echo "🔍 Running code quality checks..."
          pylint src || true  # Allow warnings without failing build
          echo "✅ Linting completed."

      # ====================================================================
      # 3️⃣ TEST STAGE – Run Unit, Integration & System Tests
      # ====================================================================
      - name: 🧪 Test Stage - Run Test Cases
        run: |
          echo "🧪 Executing pytest with coverage..."
          pytest -v --cov=src --cov-report=term-missing

      # ====================================================================
      # 4️⃣ SECURITY STAGE – Static security analysis
      # ====================================================================
      - name: 🔒 Security Stage - Bandit Security Scan
        run: |
          echo "🔒 Running Bandit to check vulnerabilities..."
          bandit -r src -f txt -o security-report.txt || true
          echo "✅ Security scan completed. Report saved as security-report.txt"

      # ====================================================================
      # 5️⃣ DEPLOY STAGE – Simulated Deployment after success
      # ====================================================================
      - name: 🚀 Deploy Stage - Simulated Deployment
        if: success()
        run: |
          echo "🚀 All stages passed successfully!"
          echo "Deploying Faculty Attendance System (simulation)..."
          echo "✅ Deployment simulated successfully. Pipeline completed."
